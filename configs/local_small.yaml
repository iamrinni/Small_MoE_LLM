# Small local run — fits in ~16GB (MPS/CPU), uses REAL data from data/raw.
# Modest model (~30M) + short sequences so it trains in minutes locally for visualization.

defaults:
  model_config: configs/model_small.yaml

run:
  name: local-small
  seed: 42
  deterministic: true
  output_dir: checkpoints/local-small

# shrink the model so it fits local memory and trains fast
model_overrides:
  hidden_size: 256
  intermediate_size: 688        # ~8/3 * 256 (SwiGLU)
  num_hidden_layers: 4
  num_attention_heads: 4
  num_key_value_heads: 4
  num_experts: 8
  num_experts_per_tok: 2
  max_position_embeddings: 256

data:
  tokenizer: allenai/OLMoE-1B-7B-0924
  max_seq_len: 256
  mixture: {language: 0.4, code: 0.25, math: 0.2, logic: 0.15}
  source: local
  data_dir: data/raw
  train_examples: null
  val_per_modality: 16

training:
  precision: bfloat16           # device-aware → fp32 on CPU/MPS
  per_device_batch_size: 4
  grad_accum_steps: 2
  max_steps: 150
  warmup_steps: 15
  lr: 1.0e-3
  min_lr: 1.0e-4
  weight_decay: 0.1
  lr_schedule: cosine
  grad_clip: 1.0
  optimizer: adamw
  adam_beta1: 0.9
  adam_beta2: 0.95

eval:
  eval_every_steps: 50
  save_every_steps: 150
  save_total_limit: 1

logging:
  backend: tensorboard
  log_every_steps: 5
  log_routing_stats: true
  json_log_path: logs/local_small_metrics.jsonl
