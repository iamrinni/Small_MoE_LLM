# Small MoE LM — default model config (locked decisions from claude/instruction.md).
# Fields map onto HF transformers OlmoeConfig; *_ext keys are our extensions.

model:
  # --- size (small: ~tens of millions of params) ---
  vocab_size: 50304              # GPT-NeoX / OLMoE tokenizer vocab (set by tokenizer at build time)
  hidden_size: 512
  # Expert FFN hidden width. RULE: derive from hidden_size, keep params matched across
  # the SwiGLU/GeLU ablation.
  #   SwiGLU (default):  d_ff = (8/3) * hidden ~ 1408   (3 matrices: gate, up, down)
  #   GeLU MLP (ablation): d_ff = 1.5 * d_ff_swiglu ~ 2112  (2 matrices; param-matched)
  intermediate_size: 1408
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8         # set < heads for grouped-query attention
  max_position_embeddings: 1024

  # --- Mixture of Experts (LOCKED: 8 experts, top-2) ---
  num_experts: 8
  num_experts_per_tok: 2         # top-2 gating
  norm_topk_prob: true           # normalize the top-2 gate weights
  router_aux_loss_coef: 0.01     # load-balancing aux loss weight (HF built-in = "Routing loss" metric)
  output_router_logits: true     # needed for routing-stats instrumentation
  # NOTE: router z-loss intentionally NOT used. It stays only as a dormant config var
  # (SmallMoEConfig.router_z_loss_coef, default 0.0); enable only if bf16 routing destabilizes.

  # --- positional encoding (LOCKED: RoPE; switch to learnable for ablation) ---
  pos_encoding_ext: rope         # {rope | learnable}
  rope_theta: 10000.0

  # --- expert FFN (LOCKED: SwiGLU, HF-native; switch to gelu for ablation) ---
  expert_activation_ext: swiglu  # {swiglu | gelu}

  # --- precision: target bf16 (spec); device-aware via resolve_dtype ---
  # GPU runs/inference -> bf16. Local CPU dev/tests -> fp32 (CPU bf16 is emulated ~67x slower).
  dtype_ext: bfloat16

  attention_dropout: 0.0
  tie_word_embeddings: true
