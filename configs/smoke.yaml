# Tiny config for the clean-environment smoke test (CPU-feasible, ~seconds).
# Used by scripts/setup.sh to prove the pipeline runs end-to-end.

defaults:
  model_config: configs/model_small.yaml

run:
  name: smoke
  seed: 42
  deterministic: true
  output_dir: checkpoints/smoke

# shrink the model so it runs on CPU in seconds
model_overrides:
  hidden_size: 64
  intermediate_size: 128
  num_hidden_layers: 2
  num_attention_heads: 4
  num_key_value_heads: 4
  num_experts: 8
  num_experts_per_tok: 2
  max_position_embeddings: 128

data:
  tokenizer: allenai/OLMoE-1B-7B-0924
  max_seq_len: 64
  mixture: {language: 0.4, code: 0.25, math: 0.2, logic: 0.15}
  max_samples_per_modality: 64
  source: synthetic          # smoke uses network-free synthetic data
  synthetic_size: 2000
  train_examples: 200        # cap the epoch for a fast smoke run
  val_per_modality: 8

training:
  precision: bfloat16           # target bf16; device-aware -> fp32 on local CPU (smoke runs here)
  per_device_batch_size: 2
  grad_accum_steps: 1
  max_steps: 10
  warmup_steps: 2
  lr: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1
  lr_schedule: cosine
  grad_clip: 1.0
  optimizer: adamw
  adam_beta1: 0.9
  adam_beta2: 0.95

eval:
  eval_every_steps: 5
  save_every_steps: 10
  save_total_limit: 1

logging:
  backend: tensorboard
  log_every_steps: 1
  log_routing_stats: true
  json_log_path: logs/smoke_metrics.jsonl
