# Small MoE LM — default training config. One file fully describes a run (reproducibility).

defaults:
  model_config: configs/model_small.yaml

run:
  name: small-moe-baseline
  seed: 42
  deterministic: true
  output_dir: checkpoints/small-moe-baseline

data:
  tokenizer: allenai/OLMoE-1B-7B-0924   # reuse OLMoE/GPT-NeoX BPE tokenizer
  max_seq_len: 1024
  # multi-task mixture weights (must sum to 1.0); see src/data/mixture.py
  mixture:
    language: 0.40
    code: 0.25
    math: 0.20
    logic: 0.15
  # per-modality sample caps to keep a run small & fast
  max_samples_per_modality: 20000
  source: local              # {local | synthetic | auto}; local reads data/raw/*.jsonl
  data_dir: data/raw
  train_examples: null       # null = stream until max_steps
  val_per_modality: 16

training:
  precision: bfloat16
  per_device_batch_size: 8
  grad_accum_steps: 4
  max_steps: 5000
  warmup_steps: 200
  lr: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1
  lr_schedule: cosine
  grad_clip: 1.0
  optimizer: adamw
  adam_beta1: 0.9
  adam_beta2: 0.95

eval:
  eval_every_steps: 500
  save_every_steps: 1000
  save_total_limit: 3

logging:
  backend: tensorboard          # {tensorboard | wandb | both}
  wandb_project: small-moe-llm
  log_every_steps: 20
  log_routing_stats: true       # per-expert load, gate entropy, routing loss
  json_log_path: logs/metrics.jsonl
